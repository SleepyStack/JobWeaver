spring:
  application:
    name: jobweaver-api

  datasource:
    url: jdbc:postgresql://localhost:5432/jobweaver_api?options=-c%20TimeZone=Asia/Kolkata
    username: jobweaver
    password: jobweaver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092

app:
  kafka:
    topics:
      job-created: job-created

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://postgres-api:5432/jobweaver_api?options=-c%20TimeZone=Asia/Kolkata

  kafka:
    bootstrap-servers: kafka:29092
