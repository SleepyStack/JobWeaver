spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/jobweaver
    username: jobweaver
    password: jobweaver

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: jobweaver-workers
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.jobweaver.common.messaging"

management:
  endpoints:
    web:
      exposure:
        include: health,info
